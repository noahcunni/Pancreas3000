<!DOCTYPE html>
<html>
    <style>
        .body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color:rgb(139, 107, 59);

        }   

        .header {
            color: rgb(61, 22, 22);
            font-weight: 800;
            font-size: 120px;
        }

        .form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input {
            font-size: 70px;
            padding: 10px 10px;
            border-radius: 30px;
            background-color: antiquewhite;
        }

        .promptInput {
            color: rgb(232, 202, 202);
            font-size: 90px;
            font-weight: 800;
        }

        button {
            margin-top: 80px;
            color: red;
            border-radius: 30px;
            font-size: 60px;
            padding: 10px 4px;
        }

        button:hover {
            background-color: grey;
        }

        .submit-button {
            font-size: 70px;
            padding: 10px 10px;
            border-radius: 30px;
            background-color: antiquewhite;
        }

        .submit-green {
            background-color: green;
        }
    </style>
    <head>
        <title class="header">Pancrease3000</title>
    </head>

    <body class="body">
        <h1 class="header">pancreas-3000</h1>

        <form id="bolusForm" action="/bolus/preview" method="post" class="form">
            <!-- Carbs -->
            <label for="carbs" class="promptInput">Carbs:</label>
            <input type="number" id="carbs" name="carbs" inputmode="numeric"><br><br>

            <!-- BG -->
            <label for="glucose" class="promptInput">Blood Glucose:</label>
            <input type="number" id="glucose" name="glucose" inputmode="numeric"><br><br>

            <!-- Insulin -->
            <label for="insulin" class="promptInput">Insulin:</label>
            <input type="number" id="insulin" name="insulin" inputmode="decimal"><br><br>

            <!-- Submit -->
            <input class="submit-button" type="submit" value="Submit" id="submitButton">
        </form> 

        <div id="proposal"></div>

        <button type="button" id='confirmButton'>Confirm Dose</button>
        
        <script>                

/*----- ----- ----- ----- ----- ----- API'S ----- ----- ----- ----- ----- -----*/
            let proposalId = null;
            const submitButton = document.getElementById("submitButton");

            document.getElementById('bolusForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const out = document.getElementById('proposal');

                let res;
                try {
                    res = await fetch('/bolus/preview', {
                        method: "POST",
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ carbs: +carbs.value, bg: +glucose.value, insulin: +insulin.value })
                });
                } catch (networkError) {
                    out.textContent = "Can't reach the pump right now - check network or hotspot";
                    proposalId = null;
                    submitButton.classList.remove("submit-green");
                    return;
                } 

                if (!res.ok) { // Pump rejected request
                    const body = await res.json().catch(() => ({}));
                    out.textContent = body.error ?? ('Error' + res.status);
                    proposalId = null;
                    submitButton.classList.remove("submit-green");
                    return;
                }

                const proposal = await res.json();
                out.textContent = `Dose ${proposal.insulin} Units`;
                proposalId = proposal.randomId; 

                if (proposalId === null) {
                    submitButton.classList.remove("submit-green");
                } else {
                    submitButton.classList.add("submit-green");
                }
            });

            document.getElementById('confirmButton').addEventListener('click', async (e) => {
                e.preventDefault();
                const out = document.getElementById('proposal');

                if (proposalId === null) {
                    out.textContent = 'No proposal active - preview dose first';
                    return;
                }

                let res;
                try {
                    res = await fetch('/bolus/confirmation', {
                        method: "POST",
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ proposalId })
                    });
                } catch (networkError) {
                    out.textContent = "Lost connection while sending confirmation, CHECK PUMP FOR ACTIVITY, post could have reached";
                    return;
                }

                if (!res.ok) {
                    const body = await res.json().catch(() => ({}));
                    out.textContent = 'Dose refused: ' + (body.error ?? res.statsu);
                    return;
                }

                out.textContent = 'Dose confirmed';
                proposalId = null;
            });
/*----- ----- ----- ----- ----- ----- ----- ----- ----- ----- ----- ----- -----*/
        </script>
    </body>
</html>
